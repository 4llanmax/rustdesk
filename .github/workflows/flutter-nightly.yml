name: Flutter Nightly Build

on:
  schedule:
    # schedule build every night
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      rendezvous-server:
        description: 'Rendezvous Server IP/Domain'
        required: false
        type: string
        default: ''
      rs-pub-key:
        description: 'Rendezvous Server Public Key'
        required: false
        type: string
        default: ''
      api-server:
        description: 'API Server IP/Domain'
        required: false
        type: string
        default: ''

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
      rendezvous-server: ${{ inputs.rendezvous-server }}
      rs-pub-key: ${{ inputs.rs-pub-key }}
      api-server: ${{ inputs.api-server }}
