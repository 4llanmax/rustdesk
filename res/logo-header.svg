<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 286.6" width="1000" height="286.6">
  <defs>
    <linearGradient id="header-logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <style>
      .text-title {
        font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 78px;
        fill: #1e293b;
      }
      .text-desk {
        font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 78px;
        fill: #10b981;
      }
      .text-tagline {
        font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
        font-weight: 500;
        font-size: 24px;
        fill: #64748b;
        letter-spacing: 2px;
      }
    </style>
  </defs>
  
  <!-- Sleek premium background -->
  <rect width="1000" height="286.6" fill="#f8fafc" rx="16" />

  <!-- Logo Icon on the left -->
  <g transform="translate(80, 43.3)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#header-logo-grad)" stroke-width="16" stroke-dasharray="320 100" stroke-linecap="round" />
    <circle cx="100" cy="100" r="58" fill="none" stroke="#10b981" stroke-width="12" stroke-dasharray="140 60" stroke-linecap="round" />
    <circle cx="100" cy="100" r="24" fill="url(#header-logo-grad)" />
    <circle cx="172" cy="100" r="11" fill="#10b981" />
    <circle cx="28" cy="100" r="11" fill="#34d399" />
  </g>

  <!-- Typography on the right -->
  <text x="340" y="145" class="text-title">Dottcon<tspan class="text-desk">Desk</tspan></text>
  <text x="345" y="195" class="text-tagline">SUPORTE REMOTO &amp; CONECTIVIDADE</text>
</svg>